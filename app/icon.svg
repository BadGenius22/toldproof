<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 11 11" shape-rendering="crispEdges">
  <!--
    TOLDPROOF pixel wax-seal mark (BRAND_MARK from components/design/bitmaps.ts).
    9x9 grid with 1-unit padding, dark ink background, paper-colored pixels so
    the mark stays readable on both light and dark browser tabs.
  -->
  <rect width="11" height="11" rx="1.5" fill="#14130f"/>
  <g fill="#f6f4ef">
    <rect x="3" y="1" width="5" height="1"/>
    <rect x="2" y="2" width="7" height="1"/>
    <rect x="1" y="3" width="2" height="1"/>
    <rect x="8" y="3" width="2" height="1"/>
    <rect x="1" y="4" width="2" height="1"/>
    <rect x="5" y="4" width="1" height="1"/>
    <rect x="8" y="4" width="2" height="1"/>
    <rect x="1" y="5" width="2" height="1"/>
    <rect x="4" y="5" width="3" height="1"/>
    <rect x="8" y="5" width="2" height="1"/>
    <rect x="1" y="6" width="2" height="1"/>
    <rect x="5" y="6" width="1" height="1"/>
    <rect x="8" y="6" width="2" height="1"/>
    <rect x="1" y="7" width="2" height="1"/>
    <rect x="8" y="7" width="2" height="1"/>
    <rect x="2" y="8" width="7" height="1"/>
    <rect x="3" y="9" width="5" height="1"/>
  </g>
</svg>
